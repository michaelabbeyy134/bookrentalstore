<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #28a745;
        }

        .success-message {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #333;
        }

        .book-details {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            text-align: left;
        }

        .book-details h3 {
            color: #007BFF;
            margin-bottom: 10px;
        }

        .book-details p {
            margin: 5px 0;
            color: #555;
        }

        .button-group {
            margin-top: 30px;
        }

        .button {
            display: inline-block;
            padding: 12px 20px;
            margin: 10px;
            background-color: #007BFF;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Success!</h1>
    <p class="success-message">You have successfully rented the book.</p>

    <div class="book-details">
        <h3>Book Details</h3>
        <p><strong>Title:</strong> {{ book.title }}</p>
        <p><strong>Author:</strong> {{ book.author }}</p>
        <p><strong>Rented By:</strong> {{ rental.user_name }}</p>
        <p><strong>Phone Number:</strong> {{ rental.phone_number }}</p>
        <p ><strong>Rented On:</strong> {{ rental.rented_on }}</p>
    </div>

    <div class="button-group">
        <a href="{% url 'available_books' %}" class="button">Back to Available Books</a>
        <a href="{% url 'index' %}" class="button">Home</a>
        <a href="{% url 'user_rentals' %}" class="button">Rentals</a>
        
    </div>
</div>

</body>
</html>
