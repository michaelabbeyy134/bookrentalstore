<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #333;
            color: white;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .add-book {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .add-book:hover {
            background-color: #218838;
        }
        .action-buttons a {
            margin-right: 10px;
        }
        .action-buttons a.edit {
            color: #ffc107;
        }
        .action-buttons a.delete {
            color: #dc3545;
        }
    </style>
</head>
<body>

    <h2>Manage Books</h2>

    <a href="{% url 'add_book' %}" class="add-book">Add New Book</a>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.available|yesno:"Yes,No" }}</td>
                <td class="action-buttons">
                    <a href="{% url 'edit_book' book.id %}" class="edit">Edit</a>
                    <a href="{% url 'delete_book' book.id %}" class="delete">Remove</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'index' %}">Back to Home</a>

</body>
</html>
