<!doctype html>
{% load static%}
<html>

<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE-edge">
<meta name="viewport" content="width=device-width, intial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Book Rental Store</title>







<!--poppins-font-family-------------------------->
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'bookrentalstore/css/bootstrap.min.css'%}">
<link rel="stylesheet" href="{% static 'bookrentalstore/css/style.css' %}">
<style>
  .responsive-img {
      max-width: 100%;
      height: auto;
      display: block;
}

  
.alert {
  transition: opacity 1s ease-out;
}

body{
  background-color: light-blue;
  margin:0;
  padding:0;
}

.container{
  max-width:100%;
  padding:0;
}

.container img{
  max-width:100%;
}

</style>

</head>

<nav class="navbar navbar-light bg-dark justify-content-between">
      <div class="dropdown">
      <a class="btn btn-secondary dropdown-toggle" href="" role="img" id="dropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false"><img src="{% static 'bookrentalstore/images/user.png'%}" height="22" alt="Profile" class="Profile-image">
      
      </a>

      
    
      <div class="dropdown-menu" aria-labelledby="dropdownMenuLink">
        {% if user.is_authenticated %}
        <a class="dropdown-item" href="{% url 'logout' %}">Logout</a>
        {% else %}
        <a class="dropdown-item" href="{% url 'login' %}">Log in</a>
        <a class="dropdown-item" href="{% url 'register' %}">Register</a>
       
        {% endif %}
        
        
        
        

        
      </div>
    </div>
    {% if user.is_authenticated %}
    <a href="{% url 'available_books' %}"   class=" text-light">Book Rental</a>
   
    {% endif %}
    
  </nav>









<body>


  <div class="container">
    {% if messages %}
        {% for message in messages %}
            <p class="alert alert-{{ message.tags }}">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <img src="{% static 'bookrentalstore/images/librar.avif' %}" alt="Book" class="responsive-img">
</div>















  
      
      
      

      <script src="{% static 'bookrentalstore/js/jquery-3.7.1.min.js' %}"></script>
      <script src="{% static 'bookrentalstore/js/bootstrap.bundle.min.js' %}"></script>
      <script src="{% static 'bookrentalstore/js/bootstrap.min.js' %}"></script>
</link>
</link>
</link>
<script>
  document.addEventListener("DOMContentLoaded", function() {
      setTimeout(function() {
          var alerts = document.querySelectorAll('.alert');
          alerts.forEach(function(alert) {
              alert.style.opacity = 0;
              setTimeout(function() {
                  alert.style.display = 'none';
              }, 1000); // Match the fade-out transition duration
          });
      }, 2000); // Delay before hiding messages (2000ms = 2 seconds)
  });
</script>
</body>

</html>
